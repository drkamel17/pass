<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SecurePass - Réinitialiser le mot de passe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <svg viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="#667eea"/>
                    <path d="M16 6L8 10v6c0 5.5 3.4 10.6 8 12 4.6-1.4 8-6.5 8-12v-6l-8-4z" fill="white" fill-opacity="0.9"/>
                    <circle cx="16" cy="16" r="4" fill="#667eea"/>
                </svg>
                <h1>SecurePass</h1>
                <p>Nouveau mot de passe</p>
            </div>

            <div id="error" class="alert error hidden"></div>
            <div id="success" class="alert success hidden"></div>

            <!-- Password reset form -->
            <form id="resetPasswordForm">
                <p class="text-muted mb-3">Entrez votre nouveau mot de passe Supabase</p>
                
                <div class="form-group">
                    <label for="newPassword">Nouveau mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="newPassword" required placeholder="Nouveau mot de passe" minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('newPassword')">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirmer le mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="confirmPassword" required placeholder="Confirmer le mot de passe">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword')">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="masterPassword">Mot de passe maître</label>
                    <input type="password" id="masterPassword" required placeholder="Mot de passe maître">
                    <small>Ce mot de passe chiffre vos données localement</small>
                </div>
                
                <button type="submit" class="btn-primary" id="submitBtn">Mettre à jour le mot de passe</button>
            </form>

            <p class="auth-switch">
                <a href="index.html">Retour à la connexion</a>
            </p>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Supabase password reset can come in different formats:
        // 1. #access_token=xxx&type=recovery&...
        // 2. ?token=xxx&type=recovery
        // 3. ?hash_token=xxx (older format)
        
        // Check hash parameters first (Supabase uses hash for access_token)
        let hashParams = new URLSearchParams(window.location.hash.substring(1));
        let accessToken = hashParams.get('access_token');
        let type = hashParams.get('type');
        
        console.log('Hash - access_token:', accessToken ? 'present' : 'none', 'type:', type);
        
        // If not in hash, check query parameters
        if (!accessToken) {
            const queryParams = new URLSearchParams(window.location.search);
            accessToken = queryParams.get('access_token') || queryParams.get('token') || queryParams.get('hash_token');
            type = queryParams.get('type');
            console.log('Query - access_token:', accessToken ? 'present' : 'none', 'type:', type);
        }
        
        // Check for error parameters in URL
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');
        
        if (error) {
            console.log('URL Error:', error, errorDescription);
            document.getElementById('error').textContent = decodeURIComponent(errorDescription || 'Lien invalide ou expiré');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('resetPasswordForm').classList.add('hidden');
        }
        else if (accessToken && type === 'recovery') {
            // Valid recovery token
            handlePasswordReset(accessToken);
        } else if (accessToken) {
            // Token exists but type might be different - try anyway
            handlePasswordReset(accessToken);
        } else {
            // No token found
            document.getElementById('error').textContent = 'Lien de réinitialisation invalide ou expiré. Veuillez demander un nouveau lien.';
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('resetPasswordForm').classList.add('hidden');
        }
        
        async function handlePasswordReset(token) {
            console.log('Processing password reset with token');
            
            document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const masterPassword = document.getElementById('masterPassword').value;
                const submitBtn = document.getElementById('submitBtn');
                
                if (newPassword !== confirmPassword) {
                    showError('Les mots de passe ne correspondent pas');
                    return;
                }
                
                if (newPassword.length < 6) {
                    showError('Le mot de passe doit contenir au moins 6 caractères');
                    return;
                }
                
                submitBtn.disabled = true;
                submitBtn.textContent = 'Mise à jour...';
                
                try {
                    // Update the user's password using the token
                    const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                        method: 'PUT',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ password: newPassword })
                    });
                    
                    if (response.ok) {
                        // Store master password
                        localStorage.setItem('masterKey', masterPassword);
                        
                        // Redirect to login with success message
                        showSuccess('Mot de mise à jour! Redirect...');
                        setTimeout(() => {
                            window.location.href = 'index.html?message=password_updated';
                        }, 2000);
                    } else {
                        const error = await response.json();
                        throw new Error(error.msg || 'Erreur lors de la mise à jour');
                    }
                } catch (error) {
                    console.error('Password reset error:', error);
                    showError(error.message || 'Erreur lors de la mise à jour du mot de passe');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Mettre à jour le mot de passe';
                }
            });
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            document.getElementById('success').classList.add('hidden');
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.classList.remove('hidden');
            document.getElementById('error').classList.add('hidden');
        }
    </script>
</body>
</html>
