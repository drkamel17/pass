<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SecurePass - Inscription</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <svg viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="#667eea"/>
                    <path d="M16 6L8 10v6c0 5.5 3.4 10.6 8 12 4.6-1.4 8-6.5 8-12v-6l-8-4z" fill="white" fill-opacity="0.9"/>
                    <circle cx="16" cy="16" r="4" fill="#667eea"/>
                </svg>
                <h1>SecurePass</h1>
                <p>Créer un nouveau compte</p>
            </div>

            <div id="error" class="alert error hidden"></div>
            <div id="success" class="alert success hidden"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" required placeholder="Mot de passe" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmer le mot de passe</label>
                    <input type="password" id="confirmPassword" required placeholder="Confirmer le mot de passe">
                </div>
                <div class="form-group">
                    <label for="masterPassword">Mot de passe maître</label>
                    <input type="password" id="masterPassword" required placeholder="Mot de passe maître" minlength="8">
                    <small>Minimum 8 caractères</small>
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">Créer un compte</button>
            </form>

            <p class="auth-switch">
                Déjà un compte? <a href="index.html">Se connecter</a>
            </p>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('user_id')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
